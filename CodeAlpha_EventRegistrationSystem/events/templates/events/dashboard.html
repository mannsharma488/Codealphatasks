{% extends 'events/base.html' %}

{% block content %}

<h1 class="text-center text-primary mb-5">📊 Dashboard</h1>

<div class="row text-center">

    <div class="col-md-6">
        <div class="card p-4 shadow">
            <h2>{{ total_events }}</h2>
            <p>Total Events</p>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-4 shadow">
            <h2>{{ total_registrations }}</h2>
            <p>Total Registrations</p>
        </div>
    </div>

</div>

<hr>

<h3 class="mt-4">Category Stats</h3>

{% for c in categories %}
    <p>{{ c.category }} : {{ c.total }}</p>
{% endfor %}

{% endblock %}
