{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark shadow sticky-top"
        style="background: linear-gradient(90deg,#0d6efd,#6610f2);">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="/">
                🎉 EventHub
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item mx-2">
                        <a class="nav-link fw-semibold" href="/">
                            <i class="bi bi-house-fill"></i> Home
                        </a>
                    </li>

                    <li class="nav-item mx-2">
                        <a class="nav-link fw-semibold" href="/events/">
                            <i class="bi bi-calendar-event-fill"></i> Events
                        </a>
                    </li>

                    <li class="nav-item mx-2">
                        <a class="nav-link fw-semibold"
                            href="/my-registrations/">
                            <i class="bi bi-person-check-fill"></i>
                            My Registrations
                        </a>
                    </li>

                    <li class="nav-item ms-3">
                        <a href="/admin/"
                            class="btn btn-warning fw-bold">
                            Admin
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main -->

    <div class="container mt-5">

        {% if messages %}

        {% for message in messages %}

        <div class="alert alert-success alert-dismissible fade show">

            {{ message }}

            <button class="btn-close"
                data-bs-dismiss="alert"></button>

        </div>

        {% endfor %}

        {% endif %}

        {% block content %}

        {% endblock %}

    </div>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center mt-5 py-4">

        <h5>🎉 Event Registration System</h5>

        <p class="mb-0">
            Developed by <strong>Mann Sharma</strong> | © 2026
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
