{% extends 'events/base.html' %}

{% block content %}

<div class="card shadow-lg p-5">

    <h2 class="text-center text-primary mb-4">
        Register for {{ event.title }}
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input
                type="text"
                name="phone"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">College Name</label>
            <input
                type="text"
                name="college"
                class="form-control"
                required>
        </div>

        <div class="text-center">
            <button class="btn btn-success btn-lg">
                Register Now
            </button>
        </div>

    </form>

</div>

{% endblock %}
